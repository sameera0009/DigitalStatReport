<body>
<div id="root"><div class="boot">LOADING TRANSACTION ANALYTICS</div></div>
<script>
"use strict";

/* =========================== CONSTANTS ========================== */
const REQUIRED_COLS = ["TXN_DATE","GROUP","CATEGORY","SUB_CATEGORY","APPROVED_COUNT","DECLINED_COUNT"];
const NULLISH = new Set(["%null%","null","(null)","(blank)","%missing%","undefined","nan"]);

function cleanFieldName(name){
  let n = String(name || "").trim();
  for(let i = 0; i < 3; i++){
    const m = n.match(/^[A-Za-z_]{2,12}\((.*)\)$/);
    if(!m) break;
    n = m[1].trim();
  }
  return n.replace(/\s*\(copy\)\s*$/i,"").trim().toUpperCase();
}

function cleanText(dv){
  const raw = dv?.value ?? dv?.formattedValue ?? "";
  const s = String(raw).trim();
  return NULLISH.has(s.toLowerCase()) ? "" : s;
}

function idxOf(cols, name){
  return cols.findIndex(c => cleanFieldName(c.fieldName) === name.toUpperCase());
}

/* =========================== VALIDATION ENGINE ========================== */
function validateData(cols, rows){
  const results = {
    valid: true,
    errors: [],
    warnings: [],
    fieldStatus: {},
    dataPreview: [],
    stats: {}
  };

  // 1. Check required fields
  const missingFields = [];
  REQUIRED_COLS.forEach(req => {
    const idx = idxOf(cols, req);
    if(idx === -1){
      missingFields.push(req);
      results.fieldStatus[req] = { found: false, index: -1 };
    } else {
      const col = cols[idx];
      const sampleValue = rows.length > 0 ? rows[0][idx]?.value : null;
      results.fieldStatus[req] = { 
        found: true, 
        index: idx, 
        originalName: col.fieldName,
        sampleValue: sampleValue,
        type: typeof sampleValue
      };
    }
  });

  if(missingFields.length > 0){
    results.valid = false;
    results.errors.push("Missing required fields: " + missingFields.join(', '));
  }

  // 2. Check if any data exists
  if(rows.length === 0){
    results.valid = false;
    results.errors.push("No data rows found in the worksheet");
  }

  // 3. Check data types and values
  const numericIssues = [];
  const dateIssues = [];
  const groupIssues = [];
  const validGroups = new Set(["CARD", "DIGITAL", "QPLUS"]);
  const foundGroups = new Set();

  rows.slice(0, 1000).forEach((row, i) => {
    REQUIRED_COLS.forEach(req => {
      const info = results.fieldStatus[req];
      if(!info?.found) return;
      const idx = info.index;
      const val = row[idx]?.value;
      
      if(req === "APPROVED_COUNT" || req === "DECLINED_COUNT"){
        if(val !== undefined && val !== null && val !== "" && isNaN(Number(val))){
          numericIssues.push(`Row ${i+1}, ${req}: "${val}"`);
        }
      }
      if(req === "TXN_DATE"){
        if(val && isNaN(new Date(val).getTime())){
          dateIssues.push(`Row ${i+1}: "${val}"`);
        }
      }
      if(req === "GROUP"){
        const cleaned = cleanText(row[idx]);
        if(cleaned){
          const upper = cleaned.toUpperCase();
          foundGroups.add(upper);
          if(!validGroups.has(upper)){
            groupIssues.push(`"${cleaned}"`);
          }
        }
      }
    });
  });

  if(numericIssues.length > 0){
    results.warnings.push(`Numeric fields contain non-numeric values: ${numericIssues.slice(0,3).join('; ')}${numericIssues.length > 3 ? ` (+${numericIssues.length - 3} more)` : ''}`);
  }
  if(dateIssues.length > 0){
    results.warnings.push(`Invalid date formats: ${dateIssues.slice(0,3).join('; ')}${dateIssues.length > 3 ? ` (+${dateIssues.length - 3} more)` : ''}`);
  }
  if(groupIssues.length > 0){
    results.warnings.push(`GROUP contains unexpected values: ${[...new Set(groupIssues)].join(', ')}. Expected: CARD, DIGITAL, or QPLUS`);
  }
  if(foundGroups.size === 0 && rows.length > 0){
    results.warnings.push("GROUP field appears to be empty in all rows");
  }

  results.stats.groups = [...foundGroups];
  results.stats.totalRows = rows.length;
  results.stats.totalCols = cols.length;
  results.stats.foundFields = REQUIRED_COLS.filter(c => results.fieldStatus[c]?.found);
  results.stats.missingFields = missingFields;
  results.stats.allFields = cols.map(c => c.fieldName);

  // 4. Build data preview (first 3 rows)
  const previewCols = REQUIRED_COLS.filter(c => results.fieldStatus[c]?.found);
  previewCols.forEach(c => {
    const idx = results.fieldStatus[c].index;
    results.dataPreview.push({
      name: c,
      originalName: cols[idx]?.fieldName || c,
      samples: rows.slice(0, 5).map(row => {
        const val = row[idx]?.value;
        return val !== undefined && val !== null ? String(val) : "(empty)";
      })
    });
  });

  return results;
}

/* =========================== RENDER VALIDATION SCREEN ========================== */
function renderValidationScreen(validationResult, onRetry){
  const root = document.getElementById('root');
  const isValid = validationResult.valid;
  const errors = validationResult.errors || [];
  const warnings = validationResult.warnings || [];
  const status = validationResult.fieldStatus || {};
  const stats = validationResult.stats || {};
  const preview = validationResult.dataPreview || [];

  const hasErrors = errors.length > 0;
  const hasWarnings = warnings.length > 0;

  let statusClass = 'success';
  let statusIcon = '✅';
  let statusText = 'Data validation passed!';

  if(hasErrors){
    statusClass = 'error';
    statusIcon = '❌';
    statusText = 'Validation failed — please fix the issues below';
  } else if(hasWarnings){
    statusClass = 'warning';
    statusIcon = '⚠️';
    statusText = 'Validation passed with warnings — data may still work';
  }

  const fieldItems = REQUIRED_COLS.map(field => {
    const info = status[field] || { found: false };
    const isFound = info.found;
    const statusClass = isFound ? 'found' : 'missing';
    const statusIcon = isFound ? '✅' : '❌';
    const statusText = isFound ? 'Found ✓' : 'Missing ✗';
    const details = isFound ? `${info.originalName || field} (${info.type || 'unknown'})` : 'Not found';
    const sample = isFound && info.sampleValue !== undefined ? `sample: ${String(info.sampleValue).substring(0, 30)}` : '';

    return `
      <div class="field-item">
        <span class="status-icon">${statusIcon}</span>
        <span class="field-name">${field}</span>
        <span class="field-status ${statusClass}">${statusText}</span>
        <span class="field-detail">${details}</span>
        ${sample ? `<span style="color:var(--sub);font-size:11px;margin-left:auto;">${sample}</span>` : ''}
      </div>
    `;
  }).join('');

  const previewHtml = preview.length > 0 ? `
    <div class="data-preview">
      <div style="font:700 11px Sora,sans-serif;letter-spacing:1.2px;color:var(--sub);text-transform:uppercase;margin-bottom:10px;">
        📊 Data Preview (first 3 rows)
      </div>
      <table>
        <thead>
          <tr>
            <th>Field</th>
            ${preview[0]?.samples.map((_, i) => `<th>Row ${i + 1}</th>`).join('') || ''}
          </tr>
        </thead>
        <tbody>
          ${preview.map(col => `
            <tr>
              <td style="font-weight:600;color:var(--text);">${col.name}</td>
              ${col.samples.map(sample => `
                <td class="${sample === '(empty)' ? 'empty' : ''}">${sample}</td>
              `).join('')}
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  ` : '';

  const errorHtml = errors.length > 0 ? `
    <div class="error-box">
      <div style="font-weight:600;color:#c62828;font-size:13px;">❌ Errors</div>
      ${errors.map(e => `<div style="font-size:13px;color:#c62828;padding:3px 0;">• ${e}</div>`).join('')}
    </div>
  ` : '';

  const warningHtml = warnings.length > 0 ? `
    <div class="warning-box">
      <div style="font-weight:600;color:#e65100;font-size:13px;">⚠️ Warnings</div>
      ${warnings.map(w => `<div style="font-size:13px;color:#e65100;padding:3px 0;">• ${w}</div>`).join('')}
    </div>
  ` : '';

  const groupStats = stats.groups && stats.groups.length > 0 ? 
    `<span style="margin-left:12px;font-size:12px;color:var(--sub);">Groups: ${stats.groups.join(', ')}</span>` : '';

  root.innerHTML = `
    <div style="min-height:100vh;background:var(--bg);padding:20px;">
      <div class="validation-container">
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:6px;">
          <span style="font-size:32px;">${hasErrors ? '🔍' : '📊'}</span>
          <div>
            <h2>Data Validation</h2>
            <div class="subtitle">
              Checking worksheet data against required schema
              ${groupStats}
            </div>
          </div>
        </div>

        <div class="validation-status ${statusClass}">
          <span class="icon">${statusIcon}</span>
          <span>${statusText}</span>
          <span style="margin-left:auto;font-size:12px;font-weight:400;">
            ${stats.totalRows || 0} rows · ${stats.totalCols || 0} columns
          </span>
        </div>

        ${errorHtml}
        ${warningHtml}

        <div style="font:700 11px Sora,sans-serif;letter-spacing:1.2px;color:var(--sub);text-transform:uppercase;margin:16px 0 10px;">
          📋 Required Fields
        </div>
        <div class="field-list">
          ${fieldItems}
        </div>

        <div class="validation-grid">
          <div class="validation-card">
            <div class="label">📁 All Fields Found in Data</div>
            <div class="value" style="font-size:13px;font-weight:400;">
              ${stats.allFields && stats.allFields.length > 0 ? 
                stats.allFields.map(f => `<span style="display:inline-block;background:var(--surface);padding:2px 10px;border-radius:4px;margin:2px;font-size:11px;font-family:'JetBrains Mono',monospace;">${f}</span>`).join('') :
                '<span class="missing">No fields detected</span>'
              }
            </div>
          </div>
          <div class="validation-card">
            <div class="label">🔢 Statistics</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px;">
              <div><span style="color:var(--sub);font-size:11px;">Total Rows</span><br><span class="value" style="font-size:18px;">${stats.totalRows || 0}</span></div>
              <div><span style="color:var(--sub);font-size:11px;">Total Columns</span><br><span class="value" style="font-size:18px;">${stats.totalCols || 0}</span></div>
              <div><span style="color:var(--sub);font-size:11px;">Fields Found</span><br><span class="value" style="font-size:18px;color:var(--good);">${stats.foundFields?.length || 0}</span></div>
              <div><span style="color:var(--sub);font-size:11px;">Fields Missing</span><br><span class="value" style="font-size:18px;color:var(--error);">${stats.missingFields?.length || 0}</span></div>
            </div>
          </div>
        </div>

        ${previewHtml}

        <div class="btn-group">
          <button class="retry-btn" data-action="retry">🔄 Retry Loading</button>
          ${isValid ? `
            <button class="retry-btn" data-action="continue" style="background:var(--good);">
              ✅ Continue to Dashboard
            </button>
          ` : `
            <button class="retry-btn" data-action="continue" style="background:var(--sub);cursor:not-allowed;opacity:0.5;" disabled>
              ⛔ Fix Issues to Continue
            </button>
          `}
          <button class="retry-btn" data-action="reset" style="background:var(--bad);">
            🔄 Reset &amp; Reload
          </button>
        </div>

        <div class="progress-container">
          <div class="progress-bar" style="width:${isValid ? '100%' : '60%'};"></div>
        </div>

        <div style="margin-top:16px;font-size:12px;color:var(--sub);border-top:1px solid var(--border);padding-top:14px;">
          💡 Required fields: <b style="color:var(--text);font-family:'JetBrains Mono',monospace;">TXN_DATE, GROUP, CATEGORY, SUB_CATEGORY, APPROVED_COUNT, DECLINED_COUNT</b>
          <br>• <span style="color:var(--good);">GROUP</span> must be CARD, DIGITAL, or QPLUS
          <br>• <span style="color:var(--good);">TXN_DATE</span> must be a valid date (YYYY-MM-DD)
          <br>• <span style="color:var(--good);">APPROVED_COUNT</span> &amp; <span style="color:var(--good);">DECLINED_COUNT</span> must be numeric
        </div>
      </div>
    </div>
  `;

  // Attach event listeners
  root.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const action = e.currentTarget.dataset.action;
      if(action === 'retry' || action === 'reset'){
        if(onRetry) onRetry();
      } else if(action === 'continue' && isValid){
        const event = new CustomEvent('validationContinue');
        document.dispatchEvent(event);
      }
    });
  });
}

/* =========================== MAIN APP ========================== */
async function initApp(){
  const root = document.getElementById('root');
  
  try {
    root.innerHTML = `<div class="boot">🔍 VALIDATING DATA SOURCE</div>`;

    // Try to get Tableau data
    let cols, rows;
    try {
      const tb = window.tableau;
      if(!tb || !tb.extensions){
        throw new Error('Tableau Extensions API not loaded.');
      }

      await tb.extensions.initializeAsync();
      const dash = tb.extensions.dashboardContent?.dashboard;
      const ws = dash ? dash.worksheets[0] : tb.extensions.worksheetContent?.worksheet;
      
      if(!ws){
        throw new Error('No worksheet found.');
      }

      const reader = await ws.getSummaryDataReaderAsync(undefined, { ignoreSelection: true });
      const allRows = [];
      for(let p = 0; p < reader.pageCount; p++){
        const page = await reader.getPageAsync(p);
        if(!cols) cols = page.columns;
        page.data.forEach(r => allRows.push(r));
      }
      await reader.releaseAsync();
      rows = allRows;

      if(!cols || cols.length === 0){
        throw new Error('No columns found.');
      }

    } catch(err) {
      // Fallback: use sample data for testing if Tableau not available
      console.warn('Tableau data not available, using sample data for testing:', err.message);
      cols = [
        { fieldName: 'TXN_DATE' },
        { fieldName: 'GROUP' },
        { fieldName: 'CATEGORY' },
        { fieldName: 'SUB_CATEGORY' },
        { fieldName: 'APPROVED_COUNT' },
        { fieldName: 'DECLINED_COUNT' }
      ];
      rows = [
        [{ value: '2026-07-13' }, { value: 'CARD' }, { value: 'CBC Cards at CBC Devices' }, { value: 'Visa' }, { value: 150 }, { value: 5 }],
        [{ value: '2026-07-13' }, { value: 'DIGITAL' }, { value: 'ComBank Digital — Financial' }, { value: '' }, { value: 89 }, { value: 2 }],
        [{ value: '2026-07-14' }, { value: 'CARD' }, { value: 'CBC Cards at CBC Devices' }, { value: 'MasterCard' }, { value: 162 }, { value: 8 }],
        [{ value: '2026-07-14' }, { value: 'DIGITAL' }, { value: 'CEFTS Inward' }, { value: '' }, { value: 45 }, { value: 1 }],
        [{ value: '2026-07-15' }, { value: 'CARD' }, { value: 'CBC Issuer Txns at Other ATMs' }, { value: 'Visa' }, { value: 98 }, { value: 3 }],
      ];
    }

    // Validate the data
    const validationResult = validateData(cols, rows);
    
    // Show validation screen
    renderValidationScreen(validationResult, () => {
      window.location.reload();
    });

    // Listen for continue event
    document.addEventListener('validationContinue', () => {
      if(validationResult.valid){
        loadDashboard(cols, rows);
      }
    });

    // Auto-continue if valid and no errors
    if(validationResult.valid && validationResult.errors.length === 0){
      setTimeout(() => {
        const continueBtn = document.querySelector('[data-action="continue"]');
        if(continueBtn && !continueBtn.disabled){
          continueBtn.click();
        }
      }, 1500);
    }

  } catch(err) {
    console.error('Fatal error:', err);
    root.innerHTML = `
      <div style="min-height:100vh;background:var(--bg);display:grid;place-items:center;padding:20px;">
        <div class="validation-container" style="max-width:700px;border-left:4px solid var(--error);">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
            <span style="font-size:36px;">💥</span>
            <h2 style="margin:0;color:var(--error);">Fatal Error</h2>
          </div>
          <div class="error-box">
            <div style="font-weight:600;">${esc(err.message)}</div>
            <div style="font-size:13px;margin-top:4px;color:#c62828;">${err.stack || ''}</div>
          </div>
          <button class="retry-btn" onclick="window.location.reload()">🔄 Retry</button>
          <div style="margin-top:16px;font-size:13px;color:var(--sub);border-top:1px solid var(--border);padding-top:12px;">
            💡 Make sure you're running this in Tableau with a worksheet containing the required fields.
          </div>
        </div>
      </div>
    `;
  }
}

/* =========================== DASHBOARD LOADER ========================== */
function loadDashboard(cols, rows){
  // This is where the full dashboard would load
  const root = document.getElementById('root');
  root.innerHTML = `
    <div style="min-height:100vh;background:var(--bg);display:grid;place-items:center;padding:20px;">
      <div class="validation-container" style="max-width:600px;text-align:center;">
        <div style="font-size:48px;margin-bottom:12px;">🚀</div>
        <h2 style="margin:0 0 8px 0;">Dashboard Ready!</h2>
        <div style="color:var(--sub);font-size:14px;margin-bottom:16px;">
          Data validated successfully with ${rows.length} rows and ${cols.length} columns.
          <br>Loading the full dashboard...
        </div>
        <div class="progress-container">
          <div class="progress-bar" style="width:100%;"></div>
        </div>
        <div style="margin-top:16px;font-size:12px;color:var(--sub);">
          <span style="display:inline-block;background:var(--surface2);padding:4px 12px;border-radius:6px;font-family:'JetBrains Mono',monospace;">
            ✅ ${cols.map(c => c.fieldName).join(' · ')}
          </span>
        </div>
        <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
          ${rows.slice(0, 3).map(row => `
            <span style="background:var(--surface2);padding:2px 8px;border-radius:4px;font-size:11px;font-family:'JetBrains Mono',monospace;">
              ${row.map(c => c.value).join(' | ')}
            </span>
          `).join('')}
        </div>
      </div>
    </div>
  `;

  // Note: The full dashboard would load here
  console.log('Dashboard ready with:', { cols, rows });
}

/* =========================== ESCAPE HELPER ========================== */
function esc(s){
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* =========================== START APP ========================== */
document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
