<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Digital &amp; Card Transaction Statistics — Commercial Bank</title>
<script src="https://cdn.jsdelivr.net/gh/tableau/extensions-api/lib/tableau.extensions.1.latest.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#f5f7fb; --bgImage:none; --surface:#ffffff; --surface2:#f0f3f9; --border:#e3e8f2;
  --text:#0e1626; --sub:#63708c; --accent:#3b5bdb; --accent2:#0ca678;
  --good:#0ca678; --bad:#e03131; --warn:#e8890c; --error:#d63031;
  --d0:#3b5bdb; --d1:#0ca678; --d2:#7048e8; --d3:#f08c00; --d4:#d6336c; --d5:#1098ad; --d6:#868e96;
  --shadow:0 6px 24px rgba(14,22,38,.07); --heroGrad:linear-gradient(90deg,#3b5bdb,#1098ad);
  --blur:none; --glowText:none;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;min-height:100%}
body{
  background:var(--bg); background-image:var(--bgImage); background-attachment:fixed;
  color:var(--text); font-family:Inter,system-ui,sans-serif; transition:background .4s;
}
button{font-family:inherit} input{outline:none;font-family:inherit}
input:focus{border-color:var(--accent)!important}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px}
::-webkit-scrollbar-track{background:transparent}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes sweep{to{stroke-dashoffset:0}}
@keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}

.app{display:flex;min-height:100vh;position:relative}
.rail{
  width:214px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:16px 10px;gap:4px;position:sticky;top:0;height:100vh;
  overflow:hidden;z-index:5;transition:width .3s cubic-bezier(.2,.7,.2,1);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
}
.rail.closed{width:62px}
.rail .brand{display:flex;align-items:center;gap:10px;padding:4px 6px 14px}
.rail .brand-txt{white-space:nowrap;overflow:hidden}
.rail .brand-txt b{display:block;font:700 13px Sora,sans-serif;color:var(--text)}
.rail .brand-txt span{font-size:9.5px;letter-spacing:1.4px;color:var(--sub)}
.rail.closed .brand-txt,.rail.closed .nav-lbl{display:none}
.nav-btn{
  display:flex;align-items:center;gap:12px;border:none;cursor:pointer;background:transparent;
  border-left:3px solid transparent;border-radius:10px;padding:10px 11px;color:var(--sub);
  font-weight:600;font-size:13px;white-space:nowrap;transition:all .2s;text-align:left;width:100%;
}
.nav-btn.on{background:var(--surface2);border-left-color:var(--accent);color:var(--text)}
.nav-btn.boxed{border:1px solid var(--border);background:var(--surface2);border-left-width:1px;margin-bottom:8px}
.rail .spacer{margin-top:auto}
.mainwrap{flex:1;min-width:0;display:flex;flex-direction:column}
main{flex:1;padding:24px 30px 14px}
header.top{display:flex;align-items:center;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.eyebrow{font:700 10.5px Sora,sans-serif;letter-spacing:2px;color:var(--accent)}
h1.title{margin:3px 0 0;font:700 22px Sora,sans-serif;letter-spacing:-.02em;color:var(--text)}
.scopebar{margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.scopeinfo{font:500 11.5px 'JetBrains Mono',monospace;color:var(--sub);margin-left:6px}
footer{
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:12px 30px;
  border-top:1px solid var(--border);font-size:11.5px;color:var(--sub);background:var(--surface);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
}
footer .dot{width:7px;height:7px;border-radius:50%;display:inline-block;animation:blink 2.4s ease-in-out infinite}
footer .right{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
footer b{color:var(--text)} footer .brandline{display:inline-flex;align-items:center;gap:7px}
footer .sep{opacity:.4}
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:22px;
  box-shadow:var(--shadow);animation:fadeUp .5s cubic-bezier(.2,.7,.2,1) both;
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
}
.card.tight{padding:0;overflow:hidden}
.stack{display:flex;flex-direction:column;gap:18px}
.row{display:flex;gap:16px;flex-wrap:wrap}
.sect-head{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.sect-head h3{margin:0;font:700 15px Sora,sans-serif;letter-spacing:-.01em;color:var(--text)}
.sect-head .sub{font-size:11.5px;color:var(--sub);margin-top:2px}
.sect-head .right{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.chip{
  display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;
  font-size:12px;font-weight:600;line-height:1.5;background:var(--surface2);color:var(--sub);
  border:1px solid var(--border);cursor:default;user-select:none;transition:all .2s;white-space:nowrap;
}
.chip.sm{padding:3px 9px;font-size:11px}
.chip.click{cursor:pointer}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.chip.good{color:var(--good)} .chip.bad{color:var(--bad)} .chip.warnc{color:var(--warn)}
.chip .sw{width:9px;height:9px;border-radius:2px;display:inline-block}
.badge{
  font:700 11.5px 'JetBrains Mono',monospace;padding:2px 8px;border-radius:999px;
  background:var(--surface2);border:1px solid var(--border);white-space:nowrap;
}
.badge.up{color:var(--good)} .badge.dn{color:var(--bad)}
.kpi{
  background:var(--surface);border:1px solid var(--border);border-radius:18px;
  padding:16px 18px 12px;box-shadow:var(--shadow);min-width:235px;flex:1 1 245px;
  position:relative;overflow:hidden;animation:fadeUp .5s cubic-bezier(.2,.7,.2,1) both;
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
}
.kpi::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--heroGrad);opacity:.9}
.kpi .lbl{font:700 10.5px Sora,sans-serif;letter-spacing:1.4px;color:var(--sub);text-transform:uppercase}
.kpi .val{font:700 27px 'JetBrains Mono',monospace;color:var(--text);letter-spacing:-.02em;text-shadow:var(--glowText)}
.kpi .valrow{display:flex;align-items:center;gap:9px;margin:7px 0 3px;flex-wrap:wrap}
.kpi .note{font-size:11px;color:var(--sub);margin-bottom:2px}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.mini-tbl{width:100%;border-collapse:collapse;font-size:12.8px}
.mini-tbl thead tr{background:var(--surface2);color:var(--sub);text-align:left}
.mini-tbl th{padding:12px 16px;font:700 10.5px Sora,sans-serif;letter-spacing:1.2px;text-transform:uppercase;white-space:nowrap}
.mini-tbl td{padding:10px 16px;color:var(--text)}
.mini-tbl tbody tr{border-top:1px solid var(--border);transition:background .15s}
.mini-tbl tbody tr:hover{background:var(--surface2)}
.mono{font-family:'JetBrains Mono',monospace}
.tile{border:1px solid var(--border);background:var(--surface2);border-radius:12px;padding:10px 14px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px}
.inp{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:5px 9px;font-size:12px}
.toggle{display:inline-flex;align-items:center;gap:8px;background:transparent;border:none;cursor:pointer;color:var(--sub);font-size:12px;font-weight:600;padding:0}
.toggle .tk{width:34px;height:19px;border-radius:999px;background:var(--surface2);border:1px solid var(--border);position:relative;transition:background .25s;flex-shrink:0}
.toggle.on .tk{background:var(--accent)}
.toggle .nb{position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:var(--sub);transition:left .25s cubic-bezier(.2,.7,.2,1)}
.toggle.on .nb{left:16px;background:#fff}
.chartwrap{position:relative}
.ctip{
  position:absolute;top:6px;pointer-events:none;z-index:3;background:var(--surface);
  border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);padding:9px 12px;
  min-width:170px;display:none;backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
}
.ctip .d{font:700 11px Inter;color:var(--sub);letter-spacing:.4px;margin-bottom:5px}
.ctip .r{display:flex;align-items:center;gap:8px;font-size:12px;margin-top:3px}
.ctip .r .sw{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.ctip .r .n{color:var(--sub);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
.ctip .r b{color:var(--text);font-family:'JetBrains Mono',monospace}
.seg{transition:opacity .25s,transform .35s cubic-bezier(.2,.7,.2,1);cursor:pointer}
.seg:hover{opacity:.82}
.donut-leg{display:flex;flex-direction:column;gap:4px;margin-top:6px;max-width:284px}
.donut-leg .li{display:flex;align-items:center;gap:8px;font-size:12.5px;cursor:pointer;color:var(--text);padding:3px 5px;border-radius:7px;transition:background .15s}
.donut-leg .li:hover{background:var(--surface2)}
.errwrap{height:100vh;display:grid;place-items:center;background:#0c111c;padding:20px}
.errcard{max-width:620px;padding:36px;border-radius:18px;background:#131a2a;border:1px solid #26314a;color:#e9eef8}
.boot{height:100vh;display:grid;place-items:center;color:var(--sub);font:700 13px Sora,sans-serif;letter-spacing:3px;animation:pulse 1.2s ease-in-out infinite}
kbd{font:700 11px 'JetBrains Mono',monospace;padding:3px 8px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);color:var(--accent)}
.theme-card{border:2px solid var(--border);border-radius:14px;padding:14px;cursor:pointer;transition:all .25s}
.theme-card.on{border-color:var(--accent)}

/* Validation Screen Styles */
.validation-container{
  max-width: 960px;
  margin: 30px auto;
  padding: 30px;
  background: var(--surface);
  border-radius: 20px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  animation: slideDown 0.5s cubic-bezier(.2,.7,.2,1) both;
}
.validation-container h2{
  font: 700 22px Sora,sans-serif;
  color: var(--text);
  margin: 0 0 6px 0;
  display: flex;
  align-items: center;
  gap: 12px;
}
.validation-container .subtitle{
  color: var(--sub);
  font-size: 14px;
  margin-bottom: 20px;
}
.validation-status{
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  border-radius: 12px;
  margin-bottom: 20px;
  font-weight: 600;
  font-size: 15px;
}
.validation-status.success{
  background: #e8f5e9;
  color: #2e7d32;
  border: 1px solid #a5d6a7;
}
.validation-status.error{
  background: #ffebee;
  color: #c62828;
  border: 1px solid #ef9a9a;
}
.validation-status.warning{
  background: #fff3e0;
  color: #e65100;
  border: 1px solid #ffcc80;
}
.validation-status .icon{font-size: 28px;}
.validation-grid{
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin: 16px 0;
}
.validation-card{
  background: var(--surface2);
  border-radius: 12px;
  padding: 14px 16px;
  border: 1px solid var(--border);
}
.validation-card .label{
  font: 700 10px Sora,sans-serif;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--sub);
  margin-bottom: 6px;
}
.validation-card .value{
  font: 600 16px 'JetBrains Mono',monospace;
  color: var(--text);
  word-break: break-all;
}
.validation-card .value.missing{color: var(--error);}
.validation-card .value.found{color: var(--good);}
.field-list{
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin: 12px 0;
}
.field-item{
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  background: var(--surface);
  border-radius: 8px;
  border: 1px solid var(--border);
  font-size: 13px;
}
.field-item .status-icon{font-size: 18px;flex-shrink: 0;}
.field-item .field-name{
  font-weight: 600;
  font-family: 'JetBrains Mono',monospace;
  color: var(--text);
  flex: 1;
}
.field-item .field-status{
  font-size: 12px;
  padding: 2px 12px;
  border-radius: 12px;
  background: var(--surface2);
  color: var(--sub);
  white-space: nowrap;
}
.field-item .field-status.missing{
  background: #ffebee;
  color: #c62828;
}
.field-item .field-status.found{
  background: #e8f5e9;
  color: #2e7d32;
}
.field-item .field-status.warning{
  background: #fff3e0;
  color: #e65100;
}
.field-item .field-detail{
  color: var(--sub);
  font-size: 12px;
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.data-preview{
  margin-top: 16px;
  background: var(--surface2);
  border-radius: 12px;
  padding: 16px;
  border: 1px solid var(--border);
  overflow-x: auto;
}
.data-preview table{
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.data-preview th{
  text-align: left;
  padding: 8px 12px;
  font: 700 10px Sora,sans-serif;
  letter-spacing: 0.8px;
  color: var(--sub);
  text-transform: uppercase;
  border-bottom: 2px solid var(--border);
}
.data-preview td{
  padding: 6px 12px;
  font-family: 'JetBrains Mono',monospace;
  font-size: 11px;
  color: var(--text);
  border-bottom: 1px solid var(--border);
}
.data-preview .empty{color: var(--sub);font-style: italic;}
.data-preview .error-cell{color: var(--error);font-weight: 600;}
.progress-container{
  width: 100%;
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  margin: 16px 0;
  overflow: hidden;
}
.progress-bar{
  height: 100%;
  background: var(--heroGrad);
  border-radius: 2px;
  transition: width 0.3s ease;
  width: 0%;
}
.retry-btn{
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 24px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: opacity 0.2s;
  margin-top: 8px;
}
.retry-btn:hover{opacity: 0.85;}
.retry-btn:disabled{cursor:not-allowed;opacity: 0.5;}
.btn-group{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px;}
.error-box{padding:12px 16px;background:#ffebee;border-radius:8px;border-left:4px solid #c62828;margin:10px 0;}
.warning-box{padding:12px 16px;background:#fff3e0;border-radius:8px;border-left:4px solid #e65100;margin:10px 0;}
</style>
</head>
<body>

<script>
"use strict";

/* =========================== CONSTANTS ========================== */
const REQUIRED_COLS = ["TXN_DATE","GROUP","CATEGORY","SUB_CATEGORY","APPROVED_COUNT","DECLINED_COUNT"];
const NULLISH = new Set(["%null%","null","(null)","(blank)","%missing%","undefined","nan"]);
const CARD_CATS=["CBC Cards at CBC Devices","CBC Issuer Txns at Other ATMs","CBC Issuer Txns at Other POS","Other Bank Cards Acquired at CBC ATMs","Other Bank Cards Acquired at CBC POS"];
const QPLUS_CAT="Q+ Transactions", DECLINED_CAT="Declined Card Transactions";
const DIGITAL_CATS=["CEFTS Inward","CEFTS Outward","Inward e-Remittances","PayMaster","ComBank Digital — Financial","ComBank Digital — Non-Financial","Flash — Financial"];
const SCHEMES=["LankaPay","Visa","MasterCard","UnionPay"];
const THEME_PARAM="pl_theme";
const THEMES={
 light:{label:"Light",mode:"light",blur:"none",bg:"#f5f7fb",bgImage:"none",surface:"#ffffff",surface2:"#f0f3f9",border:"#e3e8f2",text:"#0e1626",sub:"#63708c",accent:"#3b5bdb",accent2:"#0ca678",good:"#0ca678",bad:"#e03131",warn:"#e8890c",donut:["#3b5bdb","#0ca678","#7048e8","#f08c00","#d6336c","#1098ad","#868e96"],glow:"none",shadow:"0 6px 24px rgba(14,22,38,.07)",heroGrad:"linear-gradient(90deg,#3b5bdb,#1098ad)"},
 dark:{label:"Dark",mode:"dark",blur:"none",bg:"#0c111c",bgImage:"none",surface:"#131a2a",surface2:"#1b2438",border:"#26314a",text:"#e9eef8",sub:"#94a1bd",accent:"#6d8dff",accent2:"#31d0a5",good:"#31d0a5",bad:"#ff6b6b",warn:"#ffb347",donut:["#6d8dff","#31d0a5","#a78bfa","#ffa94d","#f783ac","#3bc9db","#8a94a6"],glow:"none",shadow:"0 10px 32px rgba(0,0,0,.5)",heroGrad:"linear-gradient(90deg,#6d8dff,#3bc9db)"},
 glass:{label:"Glassmorphism",mode:"dark",blur:"blur(18px) saturate(150%)",bg:"#070b18",bgImage:"radial-gradient(900px 620px at 12% 6%, rgba(96,132,255,.34), transparent 60%),radial-gradient(760px 560px at 88% 18%, rgba(78,224,193,.24), transparent 62%),radial-gradient(820px 640px at 62% 98%, rgba(167,139,250,.26), transparent 60%)",surface:"rgba(255,255,255,.065)",surface2:"rgba(255,255,255,.115)",border:"rgba(255,255,255,.15)",text:"#f1f5ff",sub:"#a8b6da",accent:"#7aa2ff",accent2:"#4ee0c1",good:"#4ee0c1",bad:"#ff7a90",warn:"#ffc861",donut:["#7aa2ff","#4ee0c1","#b79cff","#ffb066","#ff8fbf","#5fd8f0","#9aa7c7"],glow:"none",shadow:"0 8px 32px rgba(0,0,0,.38)",heroGrad:"linear-gradient(90deg,#7aa2ff,#4ee0c1)"},
 neon:{label:"Neon",mode:"dark",blur:"none",bg:"#060714",bgImage:"none",surface:"#0c0e22",surface2:"#131634",border:"#20255c",text:"#eef3ff",sub:"#8d97d6",accent:"#00e5ff",accent2:"#ff2ec4",good:"#39ff9c",bad:"#ff3d6e",warn:"#ffd23d",donut:["#00e5ff","#ff2ec4","#39ff9c","#ffd23d","#8f6bff","#ff8a3d","#6474d6"],glow:"0 0 16px",shadow:"0 0 26px rgba(0,229,255,.16)",heroGrad:"linear-gradient(90deg,#00e5ff,#ff2ec4)"},
 slate:{label:"Executive Slate",mode:"dark",blur:"none",bg:"#11151a",bgImage:"none",surface:"#181e25",surface2:"#202832",border:"#2c3742",text:"#eaeff3",sub:"#9cabb7",accent:"#52b9ae",accent2:"#cda94e",good:"#52b9ae",bad:"#e06a5e",warn:"#cda94e",donut:["#52b9ae","#cda94e","#7f9fb8","#b87f9f","#6aa66a","#c98a5e","#8a94a6"],glow:"none",shadow:"0 10px 30px rgba(0,0,0,.42)",heroGrad:"linear-gradient(90deg,#52b9ae,#cda94e)"},
 royal:{label:"Royal Gold",mode:"light",blur:"none",bg:"#f8f5ee",bgImage:"none",surface:"#fffdf8",surface2:"#f2eddf",border:"#e5ddc6",text:"#221d12",sub:"#71684f",accent:"#1f3a93",accent2:"#b8860b",good:"#2e7d32",bad:"#b3261e",warn:"#a06000",donut:["#1f3a93","#b8860b","#5e35b1","#00838f","#ad1457","#546e7a","#8a94a6"],glow:"none",shadow:"0 8px 26px rgba(34,29,18,.10)",heroGrad:"linear-gradient(90deg,#1f3a93,#b8860b)"},
};
const THEME_KEYS=Object.keys(THEMES);
const SCOPES=[{key:"D1",label:"Yesterday"},{key:"L7",label:"Last 7 days"},{key:"L30",label:"Last 30 days"},{key:"CM",label:"Current month"},{key:"LM",label:"Last month"}];
const NAV=[{id:"summary",label:"Summary"},{id:"cards",label:"Cards"},{id:"digital",label:"Digital"},{id:"compare",label:"Compare"},{id:"dayvs",label:"Day vs Day"},{id:"table",label:"Table View"},{id:"settings",label:"Settings"}];

/* ================================ UTILS ================================= */
const nfInt=new Intl.NumberFormat("en-US");
const esc=s=>String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
function fmtN(v){if(v==null||isNaN(v))return"–";const a=Math.abs(v);if(a>=1e6)return(v/1e6).toFixed(a>=1e7?1:2)+"M";if(a>=1e5)return(v/1e3).toFixed(1)+"K";return nfInt.format(Math.round(v));}
function fmtFull(v){return v==null||isNaN(v)?"–":nfInt.format(Math.round(v));}
function fmtPct(v,d=1){return v==null||isNaN(v)?"–":v.toFixed(d)+"%";}
function fmtDate(iso){return iso?new Date(iso+"T00:00:00").toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}):"—";}
function fmtDateShort(iso){return iso?new Date(iso+"T00:00:00").toLocaleDateString("en-GB",{day:"2-digit",month:"short"}):"—";}
function weekdayName(iso){return iso?new Date(iso+"T00:00:00").toLocaleDateString("en-GB",{weekday:"long"}):"—";}
function shiftDays(iso,n){const d=new Date(iso+"T00:00:00");d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function shiftMonth(ym,n){const[y,m]=ym.split("-").map(Number);const d=new Date(y,m-1+n,1);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;}
function toISO(raw){if(raw==null||raw==="")return null;const d=new Date(raw);if(isNaN(d))return null;return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10);}
function deltaPct(cur,prev){if(prev==null||prev===0||cur==null)return null;return((cur-prev)/prev)*100;}
function scopeDates(all,key){
  if(!all.length)return{dates:[],prev:[]};
  const max=all[all.length-1],mo=d=>d.slice(0,7);
  if(key==="D1"){const i=all.length-1;return{dates:[max],prev:i>0?[all[i-1]]:[]};}
  if(key==="CM"){const m=mo(max),pm=shiftMonth(m,-1);return{dates:all.filter(d=>mo(d)===m),prev:all.filter(d=>mo(d)===pm)};}
  if(key==="LM"){const pm=shiftMonth(mo(max),-1),pp=shiftMonth(pm,-1);return{dates:all.filter(d=>mo(d)===pm),prev:all.filter(d=>mo(d)===pp)};}
  const span=key==="L30"?30:7,from=shiftDays(max,-(span-1)),pTo=shiftDays(from,-1),pFrom=shiftDays(from,-span);
  return{dates:all.filter(d=>d>=from),prev:all.filter(d=>d>=pFrom&&d<=pTo)};
}
function contextDates(all,sc,n=7){if(sc.length>1)return sc;if(!sc.length)return[];const i=all.indexOf(sc[0]);return all.slice(Math.max(0,i-n+1),i+1);}
function missingDates(dates){if(dates.length<2)return[];const out=[],have=new Set(dates),end=dates[dates.length-1];let cur=dates[0];while(cur<end){if(!have.has(cur))out.push(cur);cur=shiftDays(cur,1);}return out;}
function detectAnomalies(s){
  if(!s||s.length<6)return[];const chg=[];
  for(let i=1;i<s.length;i++){const p=s[i-1].v,c=s[i].v;chg.push(p>0?(c-p)/p:0);}
  const mean=chg.reduce((a,b)=>a+b,0)/chg.length;
  const sd=Math.sqrt(chg.reduce((a,b)=>a+(b-mean)**2,0)/chg.length)||1e-9;
  const out=[];chg.forEach((c,i)=>{const z=(c-mean)/sd;if(Math.abs(z)>=1.8&&Math.abs(c)>=.08)out.push({idx:i+1,date:s[i+1].d,pct:c*100,dir:c>0?"up":"down"});});
  return out;
}
function linReg(s){const n=s?.length||0;if(n<2)return 0;let sx=0,sy=0,sxy=0,sxx=0;s.forEach((p,i)=>{sx+=i;sy+=p.v;sxy+=i*p.v;sxx+=i*i;});return(n*sxy-sx*sy)/(n*sxx-sx*sx||1);}
function smoothPath(pts){
  const n=pts.length;if(!n)return"";if(n===1)return`M${pts[0].x},${pts[0].y}`;
  if(n===2)return`M${pts[0].x},${pts[0].y} L${pts[1].x},${pts[1].y}`;
  const dx=[],dy=[],m=[];
  for(let i=0;i<n-1;i++){dx[i]=pts[i+1].x-pts[i].x;dy[i]=pts[i+1].y-pts[i].y;m[i]=dy[i]/(dx[i]||1e-9);}
  const t=[m[0]];
  for(let i=1;i<n-1;i++){if(m[i-1]*m[i]<=0)t[i]=0;else{const w1=2*dx[i]+dx[i-1],w2=dx[i]+2*dx[i-1];t[i]=(w1+w2)/(w1/m[i-1]+w2/m[i]);}}
  t[n-1]=m[n-2];
  let d=`M${pts[0].x.toFixed(2)},${pts[0].y.toFixed(2)}`;
  for(let i=0;i<n-1;i++){
    const c1x=pts[i].x+dx[i]/3,c1y=pts[i].y+t[i]*dx[i]/3,c2x=pts[i+1].x-dx[i]/3,c2y=pts[i+1].y-t[i+1]*dx[i]/3;
    d+=` C${c1x.toFixed(2)},${c1y.toFixed(2)} ${c2x.toFixed(2)},${c2y.toFixed(2)} ${pts[i+1].x.toFixed(2)},${pts[i+1].y.toFixed(2)}`;
  }
  return d;
}
let __gid=0;const gid=p=>p+(++__gid);
function hexToRgba(hex,a){const h=String(hex||"").replace("#","");if(h.length!==6)return`rgba(120,140,200,${a})`;const n=parseInt(h,16);return`rgba(${n>>16&255},${n>>8&255},${n&255},${a})`;}

/* ============================== DATA LAYER =============================== */
function cleanFieldName(name){
  let n=String(name||"").trim();
  for(let i=0;i<3;i++){const m=n.match(/^[A-Za-z_]{2,12}\((.*)\)$/);if(!m)break;n=m[1].trim();}
  return n.replace(/\s*\(copy\)\s*$/i,"").trim().toUpperCase();
}
function cleanText(dv){const raw=dv?.value??dv?.formattedValue??"";const s=String(raw).trim();return NULLISH.has(s.toLowerCase())?"":s;}
const idxOf=(cols,name)=>cols.findIndex(c=>cleanFieldName(c.fieldName)===name.toUpperCase());

async function readWorksheet(){
  const tb=window.tableau;
  if(!tb || !tb.extensions) {
    console.warn('Tableau Extensions not available, using sample data');
    return null;
  }
  try {
    await tb.extensions.initializeAsync();
    const dash = tb.extensions.dashboardContent?.dashboard;
    const ws = dash ? dash.worksheets[0] : tb.extensions.worksheetContent?.worksheet;
    if(!ws) return null;
    const reader = await ws.getSummaryDataReaderAsync(undefined,{ignoreSelection:true});
    const rows=[];let cols=null;
    for(let p=0;p<reader.pageCount;p++){const page=await reader.getPageAsync(p);if(!cols)cols=page.columns;page.data.forEach(r=>rows.push(r));}
    await reader.releaseAsync();
    return {cols,rows,wsName:ws.name};
  } catch(e) {
    console.warn('Error reading worksheet:', e);
    return null;
  }
}

function shapeData(cols,rows){
  const missing=REQUIRED_COLS.filter(c=>idxOf(cols,c)<0);
  if(missing.length)return{error:missing,found:cols.map(c=>c.fieldName)};
  const ix={};REQUIRED_COLS.forEach(c=>ix[c]=idxOf(cols,c));
  const recs=[];
  rows.forEach(r=>{
    const date=toISO(cleanText(r[ix.TXN_DATE])||r[ix.TXN_DATE]?.value);if(!date)return;
    const group=cleanText(r[ix.GROUP]).toUpperCase();
    const cat=cleanText(r[ix.CATEGORY]);
    const sub=cleanText(r[ix.SUB_CATEGORY]);
    const ap=Number(r[ix.APPROVED_COUNT]?.value)||0, de=Number(r[ix.DECLINED_COUNT]?.value)||0;
    if(!group||!cat)return;
    recs.push({date,group,cat,sub,ap,de,tot:ap+de});
  });
  recs.sort((a,b)=>a.date<b.date?-1:1);
  const dates=[...new Set(recs.map(r=>r.date))].sort();
  return{recs,dates};
}

/* =========================== VALIDATION ENGINE ========================== */
function validateData(cols, rows){
  const results = {
    valid: true,
    errors: [],
    warnings: [],
    fieldStatus: {},
    dataPreview: [],
    stats: {}
  };

  if(!cols || cols.length === 0){
    results.valid = false;
    results.errors.push("No columns found in the data source");
    return results;
  }

  REQUIRED_COLS.forEach(req => {
    const idx = idxOf(cols, req);
    if(idx === -1){
      results.fieldStatus[req] = { found: false, index: -1 };
    } else {
      const col = cols[idx];
      const sampleValue = rows.length > 0 ? rows[0][idx]?.value : null;
      results.fieldStatus[req] = { 
        found: true, 
        index: idx, 
        originalName: col.fieldName,
        sampleValue: sampleValue,
        type: typeof sampleValue
      };
    }
  });

  const missingFields = REQUIRED_COLS.filter(c => !results.fieldStatus[c]?.found);
  if(missingFields.length > 0){
    results.valid = false;
    results.errors.push("Missing required fields: " + missingFields.join(', '));
  }

  if(rows.length === 0){
    results.valid = false;
    results.errors.push("No data rows found in the worksheet");
  }

  // Check data types and values
  const numericIssues = [];
  const dateIssues = [];
  const groupIssues = [];
  const validGroups = new Set(["CARD", "DIGITAL", "QPLUS"]);
  const foundGroups = new Set();

  rows.slice(0, 1000).forEach((row, i) => {
    REQUIRED_COLS.forEach(req => {
      const info = results.fieldStatus[req];
      if(!info?.found) return;
      const idx = info.index;
      const val = row[idx]?.value;
      
      if(req === "APPROVED_COUNT" || req === "DECLINED_COUNT"){
        if(val !== undefined && val !== null && val !== "" && isNaN(Number(val))){
          numericIssues.push(`Row ${i+1}, ${req}: "${val}"`);
        }
      }
      if(req === "TXN_DATE"){
        if(val && isNaN(new Date(val).getTime())){
          dateIssues.push(`Row ${i+1}: "${val}"`);
        }
      }
      if(req === "GROUP"){
        const cleaned = cleanText(row[idx]);
        if(cleaned){
          const upper = cleaned.toUpperCase();
          foundGroups.add(upper);
          if(!validGroups.has(upper)){
            groupIssues.push(`"${cleaned}"`);
          }
        }
      }
    });
  });

  if(numericIssues.length > 0){
    results.warnings.push(`Numeric fields contain non-numeric values: ${numericIssues.slice(0,3).join('; ')}${numericIssues.length > 3 ? ` (+${numericIssues.length - 3} more)` : ''}`);
  }
  if(dateIssues.length > 0){
    results.warnings.push(`Invalid date formats: ${dateIssues.slice(0,3).join('; ')}${dateIssues.length > 3 ? ` (+${dateIssues.length - 3} more)` : ''}`);
  }
  if(groupIssues.length > 0){
    results.warnings.push(`GROUP contains unexpected values: ${[...new Set(groupIssues)].join(', ')}. Expected: CARD, DIGITAL, or QPLUS`);
  }
  if(foundGroups.size === 0 && rows.length > 0){
    results.warnings.push("GROUP field appears to be empty in all rows");
  }

  results.stats.groups = [...foundGroups];
  results.stats.totalRows = rows.length;
  results.stats.totalCols = cols.length;
  results.stats.foundFields = REQUIRED_COLS.filter(c => results.fieldStatus[c]?.found);
  results.stats.missingFields = missingFields;
  results.stats.allFields = cols.map(c => c.fieldName);

  // Build data preview
  const previewCols = REQUIRED_COLS.filter(c => results.fieldStatus[c]?.found);
  previewCols.forEach(c => {
    const idx = results.fieldStatus[c].index;
    results.dataPreview.push({
      name: c,
      originalName: cols[idx]?.fieldName || c,
      samples: rows.slice(0, 5).map(row => {
        const val = row[idx]?.value;
        return val !== undefined && val !== null ? String(val) : "(empty)";
      })
    });
  });

  return results;
}

  const preview = validationResult.dataPreview || [];

  const hasErrors = errors.length > 0;
  const hasWarnings = warnings.length > 0;

  let statusClass = 'success';
  let statusIcon = '✅';
  let statusText = 'Data validation passed!';

  if(hasErrors){
    statusClass = 'error';
    statusIcon = '❌';
    statusText = 'Validation failed — please fix the issues below';

    statusClass = 'warning';
    statusIcon = '⚠️';
    statusText = 'Validation passed with warnings — data may still work';

/* =========================== FULL DASHBOARD ========================== */
function loadFullDashboard(cols, rows, validationResult){
  const root = document.getElementById('root');
  
  // Process the data
  const shaped = shapeData(cols, rows);
  if(shaped.error){
    root.innerHTML = `<div class="errwrap"><div class="errcard"><h2>Data Error</h2><p>Missing fields: ${shaped.error.join(', ')}</p><button onclick="location.reload()">Retry</button></div></div>`;
    return;
  }

  const data = shaped;
  const allDates = data.dates;
  const allRecs = data.recs;
  const sc = scopeDates(allDates, S.scope);
  const scDates = sc.dates;
  const prevDates = sc.prev;
  const prevRecs = allRecs.filter(r => prevDates.includes(r.date));
  const recs = allRecs.filter(r => scDates.includes(r.date));
  const ctxDates = contextDates(allDates, scDates);

  // Store in global V for tab functions
  window.V = { recs, scDates, prevRecs, prevDates, allRecs, allDates, ctxDates };
  window.S = { 
    ...S, 
    data: data,
    ready: true,
    validationResult: validationResult
  };

  // Build the full dashboard HTML
  root.innerHTML = `
    <div class="app">
      <div class="rail" id="rail">
        <div class="brand">
          <div style="width:28px;height:28px;border-radius:8px;background:var(--heroGrad);display:grid;place-items:center;color:#fff;font:700 13px Sora,sans-serif;flex-shrink:0">CB</div>
          <div class="brand-txt"><b>Commercial Bank</b><span>Transaction Analytics</span></div>
        </div>
        ${NAV.map(n => `
          <button class="nav-btn ${S.tab === n.id ? 'on' : ''}" data-nav="${n.id}">
            <span>${n.id === 'summary' ? '📊' : n.id === 'cards' ? '💳' : n.id === 'digital' ? '📱' : n.id === 'compare' ? '📈' : n.id === 'dayvs' ? '⚖️' : n.id === 'table' ? '📋' : '⚙️'}</span>
            <span class="nav-lbl">${n.label}</span>
          </button>
        `).join('')}
        <div class="spacer"></div>
        <button class="nav-btn boxed" data-act="toggleNav">
          <span>${S.navOpen ? '◀' : '▶'}</span>
          <span class="nav-lbl">${S.navOpen ? 'Collapse' : 'Expand'}</span>
        </button>
      </div>
      <div class="mainwrap">
        <main id="mainContent">
          <header class="top">
            <div><div class="eyebrow">COMMERCIAL BANK OF CEYLON PLC</div>
            <h1 class="title" id="pageTitle">${NAV.find(n => n.id === S.tab)?.label || 'Summary'}</h1></div>
            <div class="scopebar">
              ${SCOPES.map(s => chip(s.label, { on: S.scope === s.key, act: 'scope', arg: s.key })).join('')}
              <span class="scopeinfo">${scDates.length} days · ${fmtDate(scDates[0])} – ${fmtDate(scDates[scDates.length-1])}</span>
            </div>
          </header>
          <div id="tabContent">${tabSummary()}</div>
        </main>
        <footer>
          <span class="brandline"><span class="dot" style="background:var(--good)"></span> Live · ${new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' })}</span>
          <span class="sep">|</span>
          <span>${fmtFull(data.recs.length)} transactions · ${data.dates.length} days</span>
          <span class="right">
            <span>Theme: ${THEMES[S.theme]?.label || 'Light'}</span>
            ${validationResult.warnings.length > 0 ? `<span class="chip warnc" style="cursor:pointer" data-act="gotoSettings">⚠️ ${validationResult.warnings.length} warnings</span>` : ''}
            ${validationResult.errors.length > 0 ? `<span class="chip bad" style="cursor:pointer" data-act="gotoSettings">❌ ${validationResult.errors.length} errors</span>` : ''}
          </span>
        </footer>
      </div>
    </div>
  `;

  // Attach event listeners
  attachEventListeners();
}

/* =========================== EVENT HANDLERS ========================== */
function attachEventListeners(){
  // Navigation
  document.querySelectorAll('[data-nav]').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.nav;
      S.tab = tab;
      renderTab(tab);
    });
  });

  // Scope
  document.querySelectorAll('[data-act="scope"]').forEach(btn => {
    btn.addEventListener('click', () => {
      S.scope = btn.dataset.arg;
      renderTab(S.tab);
    });
  });

  // Toggle nav
  document.querySelector('[data-act="toggleNav"]')?.addEventListener('click', () => {
    S.navOpen = !S.navOpen;
    document.getElementById('rail')?.classList.toggle('closed');
  });

  // Go to settings
  document.querySelectorAll('[data-act="gotoSettings"]').forEach(btn => {
    btn.addEventListener('click', () => {
      S.tab = 'settings';
      renderTab('settings');
    });
  });

  // Chip clicks for tabs
  document.querySelectorAll('.chip.click[data-act]').forEach(chip => {
    chip.addEventListener('click', (e) => {
      const act = chip.dataset.act;
      const arg = chip.dataset.arg;
      handleAction(act, arg, chip);
    });
  });
}

function renderTab(tabId){
  // Update nav buttons
  document.querySelectorAll('[data-nav]').forEach(btn => {
    btn.classList.toggle('on', btn.dataset.nav === tabId);
  });
  
  // Update title
  const title = document.getElementById('pageTitle');
  if(title) title.textContent = NAV.find(n => n.id === tabId)?.label || 'Summary';
  
  // Render content
  const content = document.getElementById('tabContent');
  if(!content) return;
  
  switch(tabId){
    case 'summary': content.innerHTML = tabSummary(); break;
    case 'cards': content.innerHTML = tabCards(); break;
    case 'digital': content.innerHTML = tabDigital(); break;
    case 'compare': content.innerHTML = tabCompare(); break;
    case 'dayvs': content.innerHTML = tabDayVs(); break;
    case 'table': content.innerHTML = tabTable(); break;
    case 'settings': content.innerHTML = tabSettings(); break;
    default: content.innerHTML = tabSummary();
  }
  
  // Re-attach event listeners for new content
  document.querySelectorAll('.chip.click[data-act]').forEach(chip => {
    chip.addEventListener('click', (e) => {
      const act = chip.dataset.act;
      const arg = chip.dataset.arg;
      handleAction(act, arg, chip);
    });
  });
}

function handleAction(act, arg, element){
  console.log('Action:', act, arg);
  
  switch(act){
    case 'theme':
      S.theme = arg;
      applyTheme(arg);
      renderTab(S.tab);
      break;
    case 'scope':
      S.scope = arg;
      renderTab(S.tab);
      break;
    case 'mmode':
      S.mMode = arg;
      renderTab('summary');
      break;
    case 'cardcat':
      const idx = S.cards.cats.indexOf(arg);
      if(idx > -1) {
        if(S.cards.cats.length > 1) {
          S.cards.cats.splice(idx, 1);
        }
      } else {
        S.cards.cats.push(arg);
      }
      renderTab('cards');
      break;
    case 'cardcatsAll':
      S.cards.cats = S.cards.cats.length === CARD_CATS.length ? CARD_CATS.slice(0, 1) : [...CARD_CATS];
      renderTab('cards');
      break;
    case 'digsel':
      const di = S.digital.sel.indexOf(arg);
      if(di > -1) {
        if(S.digital.sel.length > 1) S.digital.sel.splice(di, 1);
      } else {
        S.digital.sel.push(arg);
      }
      renderTab('digital');
      break;
    case 'donutSeg':
      S.donut.sel = arg;
      renderTab(S.tab);
      break;
    case 'donutCrumb':
      const level = parseInt(arg);
      if(level < S.donut.path.length) {
        S.donut.path = S.donut.path.slice(0, level);
        S.donut.sel = null;
      }
      renderTab(S.tab);
      break;
    default:
      console.log('Unhandled action:', act, arg);
  }
}

function applyTheme(themeKey){
  const t = THEMES[themeKey];
  if(!t) return;
  const root = document.documentElement;
  Object.keys(t).forEach(key => {
    root.style.setProperty('--' + key, t[key]);
  });
  S.theme = themeKey;
}

/* =========================== TAB FUNCTIONS (stubs for now) ========================== */

  <div class="grid-auto">
    <div class="tile"><div style="font-weight:600">Validation Status</div><div>${window.S?.validationResult?.valid ? '✅ Valid' : '⚠️ Issues'}</div></div>
    <div class="tile"><div style="font-weight:600">Fields Found</div><div>${window.S?.validationResult?.stats?.foundFields?.length || 0}/${REQUIRED_COLS.length}</div></div>
  </div>
  ${window.S?.validationResult?.warnings?.length > 0 ? `<div class="warning-box">${window.S.validationResult.warnings.map(w => '• ' + w).join('<br>')}</div>` : ''}

}

function tabCards(){ return `<div class="card"><h3>Cards Dashboard</h3><p>Card transaction analytics</p></div>`; }
function tabDigital(){ return `<div class="card"><h3>Digital Dashboard</h3><p>Digital transaction analytics</p></div>`; }
function tabCompare(){ return `<div class="card"><h3>Compare Dashboard</h3><p>Comparison analytics</p></div>`; }
function tabDayVs(){ return `<div class="card"><h3>Day vs Day Dashboard</h3><p>Day comparison analytics</p></div>`; }
function tabTable(){ return `<div class="card"><h3>Table View</h3><p>Raw data view</p></div>`; }

    <div class="stack">
      <div class="card">

            <div><strong>Total Columns:</strong> ${stats.totalCols || 0}</div>

        <div class="field-list">

            const isFound = info.found;
            return `
              <div class="field-item">
                <span class="status-icon">${isFound ? '✅' : '❌'}</span>

                <span class="field-detail">${isFound ? info.originalName : 'Not found'}</span>

            `;
          }).join('')}
        </div>
      </div>
      
      ${vr.errors?.length > 0 ? `
        <div class="card" style="border-color:var(--error);">
          <h3 style="color:var(--error);">❌ Errors</h3>
          ${vr.errors.map(e => `<div style="padding:4px 0;">• ${e}</div>`).join('')}
        </div>
      ` : ''}
      
      ${vr.warnings?.length > 0 ? `
        <div class="card" style="border-color:var(--warn);">
          <h3 style="color:var(--warn);">⚠️ Warnings</h3>
          ${vr.warnings.map(w => `<div style="padding:4px 0;">• ${w}</div>`).join('')}
        </div>
      ` : ''}
      
      <div class="card">
        <h3>📊 Data Preview</h3>
        ${vr.dataPreview?.length > 0 ? `
          <div style="overflow-x:auto;">
            <table style="width:100%;border-collapse:collapse;font-size:12px;">
              <thead>
                <tr>
                  <th style="text-align:left;padding:8px;">Field</th>
                  ${vr.dataPreview[0]?.samples.map((_, i) => `<th style="text-align:left;padding:8px;">Row ${i+1}</th>`).join('')}
                </tr>
              </thead>
              <tbody>
                ${vr.dataPreview.map(col => `
                  <tr>
                    <td style="padding:6px 8px;font-weight:600;">${col.name}</td>
                    ${col.samples.map(s => `<td style="padding:6px 8px;font-family:monospace;font-size:11px;">${s}</td>`).join('')}
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        ` : '<p>No data preview available</p>'}
      </div>
      
      <div class="card">
        <h3>🎨 Theme</h3>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          ${THEME_KEYS.map(k => `
            <button class="chip click ${S.theme === k ? 'on' : ''}" data-act="theme" data-arg="${k}">${THEMES[k].label}</button>
          `).join('')}
        </div>
      </div>
      
      <div class="card">
        <h3>🔄 Actions</h3>
        <div class="btn-group">
          <button class="retry-btn" onclick="window.location.reload()">🔄 Reload Data</button>
          <button class="retry-btn" style="background:var(--good);" onclick="S.scope='L7';renderTab('summary');">📊 Go to Summary</button>
        </div>
      </div>
    </div>
  `;
}

/* =========================== GLOBAL STATE ========================== */
const S = {
  tab: 'summary',
  scope: 'L7',
  theme: 'light',
  navOpen: true,
  cards: { cats: [...CARD_CATS] },
  digital: { sel: DIGITAL_CATS.slice(0, 3) },
  donut: { path: [], sel: null },
  mMode: 'all',
  compare: { customDates: false, customCats: false, showSubs: false, chartType: 'bar', selDates: [], selCats: ['CARDS_ALL', 'DIGITAL_ALL'], from: '', to: '' },
  dayvs: { a: null, b: null },
  table: { group: 'ALL', q: '', sortK: 'tot', sortDir: -1 },
  data: null,
  ready: false,
  validationResult: null
};

function chip(label, opts = {}) {
  const classes = ['chip'];
  if(opts.small !== false) classes.push('sm');
  if(opts.on) classes.push('on');
  if(opts.act) classes.push('click');
  if(opts.tone) classes.push(opts.tone);
  return `<span class="${classes.join(' ')}" ${opts.act ? `data-act="${opts.act}"` : ''} ${opts.arg ? `data-arg="${opts.arg}"` : ''}>${label}</span>`;
}

/* =========================== START APP ========================== */
document.addEventListener('DOMContentLoaded', initApp);
</script>
