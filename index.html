<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Commercial Bank · Transaction Intelligence</title>
<script src="https://cdn.jsdelivr.net/gh/tableau/extensions-api/lib/tableau.extensions.1.latest.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-primary:#f0f3f8;
  --bg-secondary:#ffffff;
  --bg-tertiary:#f7f9fc;
  --bg-card:#ffffff;
  --text-primary:#0a1628;
  --text-secondary:#4a5a72;
  --text-muted:#8896b0;
  --border-light:#e8edf4;
  --border-medium:#d5dee8;
  --accent:#1a4cff;
  --accent-hover:#0033cc;
  --accent-light:#e8edff;
  --success:#00a86b;
  --warning:#f59e0b;
  --danger:#ef4444;
  --shadow-sm:0 1px 3px rgba(10,22,40,.06);
  --shadow-md:0 4px 16px rgba(10,22,40,.08);
  --shadow-lg:0 8px 32px rgba(10,22,40,.10);
  --radius-sm:8px;
  --radius-md:12px;
  --radius-lg:16px;
  --radius-xl:20px;
  --transition:all .25s cubic-bezier(.4,0,.2,1);
  --font:Inter,-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:JetBrains Mono,monospace;
}
body{
  font-family:var(--font);
  background:var(--bg-primary);
  color:var(--text-primary);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
.app{display:flex;min-height:100vh}
/* Sidebar */
.sidebar{
  width:240px;
  background:var(--bg-secondary);
  border-right:1px solid var(--border-light);
  display:flex;
  flex-direction:column;
  padding:24px 16px;
  flex-shrink:0;
  position:sticky;
  top:0;
  height:100vh;
  transition:var(--transition);
}
.sidebar.collapsed{width:72px}
.sidebar .brand{display:flex;align-items:center;gap:12px;padding:0 8px 24px}
.sidebar .brand-icon{
  width:36px;height:36px;
  background:linear-gradient(135deg,var(--accent),#6c8cff);
  border-radius:10px;
  display:grid;
  place-items:center;
  color:#fff;
  font-weight:800;
  font-size:16px;
  flex-shrink:0;
}
.sidebar .brand-text{transition:var(--transition);overflow:hidden}
.sidebar .brand-text h1{font-size:16px;font-weight:700;letter-spacing:-.3px;white-space:nowrap}
.sidebar .brand-text p{font-size:10px;font-weight:500;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.sidebar.collapsed .brand-text{opacity:0;width:0;margin:0}
.nav-list{display:flex;flex-direction:column;gap:2px;flex:1}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;
  border-radius:var(--radius-sm);
  border:none;
  background:transparent;
  color:var(--text-secondary);
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  transition:var(--transition);
  width:100%;
  text-align:left;
  font-family:var(--font);
}
.nav-item:hover{background:var(--bg-tertiary);color:var(--text-primary)}
.nav-item.active{
  background:var(--accent-light);
  color:var(--accent);
  font-weight:600;
}
.nav-item .icon{font-size:18px;flex-shrink:0;width:24px;text-align:center}
.nav-item .label{white-space:nowrap;transition:var(--transition)}
.sidebar.collapsed .nav-item .label{display:none}
.sidebar-footer{margin-top:auto;padding-top:16px;border-top:1px solid var(--border-light)}
/* Main Content */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.header{
  padding:20px 32px;
  background:var(--bg-secondary);
  border-bottom:1px solid var(--border-light);
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:12px;
  backdrop-filter:blur(12px);
}
.header-left h2{font-size:20px;font-weight:700;letter-spacing:-.3px}
.header-left p{font-size:13px;color:var(--text-secondary);margin-top:2px}
.header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.scope-group{display:flex;gap:4px;background:var(--bg-tertiary);padding:4px;border-radius:var(--radius-sm)}
.scope-btn{
  padding:6px 14px;
  border:none;
  border-radius:6px;
  background:transparent;
  color:var(--text-secondary);
  font-size:12px;
  font-weight:500;
  cursor:pointer;
  transition:var(--transition);
  font-family:var(--font);
}
.scope-btn:hover{color:var(--text-primary)}
.scope-btn.active{background:var(--bg-secondary);color:var(--text-primary);box-shadow:var(--shadow-sm)}
.status-badge{
  display:flex;align-items:center;gap:6px;
  padding:4px 14px;
  border-radius:20px;
  font-size:12px;
  font-weight:500;
}
.status-badge.online{background:#e6f7ef;color:var(--success)}
.status-badge.offline{background:#fef2f2;color:var(--danger)}
.status-badge.warning{background:#fffbeb;color:var(--warning)}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.status-dot.green{background:var(--success)}
.status-dot.red{background:var(--danger)}
.status-dot.yellow{background:var(--warning)}
/* Content Area */
.content{padding:24px 32px;flex:1}
/* Cards */
.card{
  background:var(--bg-card);
  border-radius:var(--radius-lg);
  border:1px solid var(--border-light);
  padding:24px;
  transition:var(--transition);
}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.card-header h3{font-size:15px;font-weight:600}
.card-header .sub{font-size:12px;color:var(--text-secondary)}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px}
.metric{
  padding:16px 20px;
  background:var(--bg-tertiary);
  border-radius:var(--radius-md);
  border:1px solid var(--border-light);
}
.metric .label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.metric .value{font-size:26px;font-weight:700;margin:4px 0;letter-spacing:-.5px;font-family:var(--mono)}
.metric .change{font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:4px}
.metric .change.up{color:var(--success)}
.metric .change.down{color:var(--danger)}
.metric .sub{font-size:12px;color:var(--text-secondary)}
/* Tables */
.table-wrap{overflow-x:auto;border-radius:var(--radius-sm)}
table{width:100%;border-collapse:collapse;font-size:13px}
table th{
  text-align:left;
  padding:12px 16px;
  font-weight:600;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.5px;
  color:var(--text-muted);
  border-bottom:2px solid var(--border-light);
  background:var(--bg-tertiary);
}
table td{padding:12px 16px;border-bottom:1px solid var(--border-light)}
table tbody tr:hover{background:var(--bg-tertiary)}
.mono{font-family:var(--mono);font-size:13px}
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 10px;
  border-radius:12px;
  font-size:11px;
  font-weight:600;
}
.badge.success{background:#e6f7ef;color:var(--success)}
.badge.warning{background:#fffbeb;color:var(--warning)}
.badge.danger{background:#fef2f2;color:var(--danger)}
.badge.info{background:#e8edff;color:var(--accent)}
/* Empty State */
.empty-state{
  text-align:center;
  padding:60px 20px;
}
.empty-state .icon{font-size:56px;margin-bottom:16px}
.empty-state h3{font-size:18px;font-weight:600;margin-bottom:8px}
.empty-state p{color:var(--text-secondary);font-size:14px;max-width:480px;margin:0 auto}
.empty-state .fields-grid{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:16px}
.empty-state .fields-grid .tag{
  padding:4px 14px;
  background:var(--bg-tertiary);
  border-radius:6px;
  font-size:12px;
  font-family:var(--mono);
  border:1px solid var(--border-light);
}
/* Tabs */
.tabs{display:flex;gap:2px;background:var(--bg-tertiary);padding:4px;border-radius:var(--radius-sm);margin-bottom:20px}
.tab-btn{
  padding:8px 20px;
  border:none;
  border-radius:6px;
  background:transparent;
  color:var(--text-secondary);
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  transition:var(--transition);
  font-family:var(--font);
}
.tab-btn:hover{color:var(--text-primary)}
.tab-btn.active{background:var(--bg-secondary);color:var(--text-primary);box-shadow:var(--shadow-sm)}
/* Loading */
.loading-overlay{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:400px;
}
.loading-spinner{
  width:40px;height:40px;
  border:3px solid var(--border-light);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay p{margin-top:16px;color:var(--text-secondary);font-size:14px}
/* Utilities */
.mt-16{margin-top:16px}
.mb-16{margin-bottom:16px}
.gap-8{display:flex;gap:8px;flex-wrap:wrap}
.flex{display:flex;align-items:center;gap:12px}
.text-muted{color:var(--text-muted)}
.text-secondary{color:var(--text-secondary)}
.text-success{color:var(--success)}
.text-danger{color:var(--danger)}
.text-warning{color:var(--warning)}
.font-mono{font-family:var(--mono)}
/* Toast notifications */
.toast{
  position:fixed;bottom:24px;right:24px;
  padding:14px 24px;
  background:var(--bg-secondary);
  border-radius:var(--radius-md);
  box-shadow:var(--shadow-lg);
  border:1px solid var(--border-light);
  font-size:13px;
  max-width:420px;
  z-index:1000;
  animation:slideUp .3s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.toast .title{font-weight:600;margin-bottom:4px}
.toast .close{float:right;background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-muted)}
.toast.error{border-left:4px solid var(--danger)}
.toast.success{border-left:4px solid var(--success)}
.toast.warning{border-left:4px solid var(--warning)}
/* Responsive */
@media(max-width:768px){
  .sidebar{width:60px;padding:16px 8px}
  .sidebar .brand-text{display:none}
  .sidebar .nav-item .label{display:none}
  .header{padding:16px}
  .content{padding:16px}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
"use strict";

/* =========================== CONSTANTS ========================== */
const REQUIRED_FIELDS = ["TXN_DATE","GROUP","CATEGORY","SUB_CATEGORY","APPROVED_COUNT","DECLINED_COUNT"];
const NAV_ITEMS = [
  { id:'overview', icon:'📊', label:'Overview' },
  { id:'cards', icon:'💳', label:'Cards' },
  { id:'digital', icon:'📱', label:'Digital' },
  { id:'comparison', icon:'📈', label:'Comparison' },
  { id:'dayvs', icon:'⚖️', label:'Day vs Day' },
  { id:'data', icon:'📋', label:'Data' }
];
const SCOPES = [
  { key:'D1', label:'Today' },
  { key:'L7', label:'7D' },
  { key:'L30', label:'30D' },
  { key:'CM', label:'Month' }
];

/* =========================== STATE ========================== */
const State = {
  tab: 'overview',
  scope: 'L7',
  data: null,
  raw: null,
  cols: null,
  validation: null,
  loading: true,
  error: null
};

/* =========================== UTILITIES ========================== */
const fmt = n => n?.toLocaleString() || '—';
const pct = (v,d=1) => v != null ? v.toFixed(d)+'%' : '—';
const dateFmt = d => d ? new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—';
const cleanField = n => String(n||'').trim().replace(/^[A-Z]{2,12}\((.*)\)$/,'$1').toUpperCase().trim();
const idxOf = (cols,n) => cols.findIndex(c => cleanField(c.fieldName) === n);
const isCard = r => r.group === 'CARD' || r.group === 'QPLUS';
const isVol = r => r.cat !== 'Declined Card Transactions';

/* =========================== DATA LOADER ========================== */
async function loadData(){
  try {
    const tb = window.tableau;
    if(!tb?.extensions) return null;
    
    await tb.extensions.initializeAsync();
    const dash = tb.extensions.dashboardContent?.dashboard;
    const ws = dash?.worksheets?.[0] || tb.extensions.worksheetContent?.worksheet;
    if(!ws) return null;
    
    const reader = await ws.getSummaryDataReaderAsync(void 0, { ignoreSelection: true });
    let cols = null, rows = [];
    for(let p=0; p<reader.pageCount; p++){
      const page = await reader.getPageAsync(p);
      if(!cols) cols = page.columns;
      page.data.forEach(r => rows.push(r));
    }
    await reader.releaseAsync();
    return { cols, rows };
  } catch(e) {
    console.warn('Data load error:', e);
    return null;
  }
}

/* =========================== VALIDATION ========================== */
function validate(cols, rows){
  const result = { valid: true, errors: [], warnings: [], fields: {} };
  
  REQUIRED_FIELDS.forEach(f => {
    const idx = idxOf(cols, f);
    result.fields[f] = { found: idx >= 0, name: idx >= 0 ? cols[idx].fieldName : null };
    if(idx < 0) result.errors.push(`Missing field: ${f}`);
  });
  
  if(!rows?.length) result.errors.push('No data rows found');
  else {
    // Check for required values
    const groups = new Set();
    let hasDate = false;
    rows.slice(0, 100).forEach((r,i) => {
      REQUIRED_FIELDS.forEach(f => {
        const idx = idxOf(cols, f);
        if(idx < 0) return;
        const val = r[idx]?.value;
        if(f === 'GROUP' && val) groups.add(String(val).toUpperCase());
        if(f === 'TXN_DATE' && val) hasDate = true;
      });
    });
    if(!hasDate && rows.length) result.warnings.push('No valid dates found in TXN_DATE');
    if(groups.size) {
      const valid = ['CARD','DIGITAL','QPLUS'];
      const invalid = [...groups].filter(g => !valid.includes(g));
      if(invalid.length) result.warnings.push(`Unexpected GROUP values: ${invalid.join(', ')}`);
    }
  }
  
  result.valid = result.errors.length === 0;
  result.hasData = rows?.length > 0;
  return result;
}

/* =========================== DATA PROCESSOR ========================== */
function processData(cols, rows){
  const ix = {};
  REQUIRED_FIELDS.forEach(f => ix[f] = idxOf(cols, f));
  if(REQUIRED_FIELDS.some(f => ix[f] < 0)) return null;
  
  const recs = [];
  rows.forEach(r => {
    const date = r[ix.TXN_DATE]?.value;
    if(!date || isNaN(new Date(date).getTime())) return;
    const group = String(r[ix.GROUP]?.value || '').toUpperCase().trim();
    const cat = String(r[ix.CATEGORY]?.value || '').trim();
    if(!group || !cat) return;
    const ap = Number(r[ix.APPROVED_COUNT]?.value) || 0;
    const de = Number(r[ix.DECLINED_COUNT]?.value) || 0;
    recs.push({
      date: new Date(date).toISOString().slice(0,10),
      group, cat,
      sub: String(r[ix.SUB_CATEGORY]?.value || '').trim(),
      ap, de, tot: ap + de
    });
  });
  recs.sort((a,b) => a.date.localeCompare(b.date));
  const dates = [...new Set(recs.map(r => r.date))].sort();
  return { recs, dates };
}

/* =========================== DASHBOARD RENDERER ========================== */
function renderDashboard(){
  const root = document.getElementById('root');
  const { tab, data, validation, cols, rows } = State;
  const hasData = data && data.recs && data.recs.length > 0;
  const valid = validation?.valid !== false;
  const errors = validation?.errors || [];
  const warnings = validation?.warnings || [];
  
  // Scope dates
  let scopeDates = [], prevDates = [];
  if(hasData){
    const all = data.dates;
    const max = all[all.length-1];
    const scope = SCOPES.find(s => s.key === State.scope) || SCOPES[1];
    if(scope.key === 'D1'){ scopeDates = [max]; prevDates = all.length > 1 ? [all[all.length-2]] : []; }
    else if(scope.key === 'L7'){ 
      const from = max ? new Date(new Date(max).getTime() - 6*86400000).toISOString().slice(0,10) : '';
      scopeDates = all.filter(d => d >= from);
      const pTo = from ? new Date(new Date(from).getTime() - 86400000).toISOString().slice(0,10) : '';
      const pFrom = from ? new Date(new Date(from).getTime() - 7*86400000).toISOString().slice(0,10) : '';
      prevDates = all.filter(d => d >= pFrom && d < (pTo || ''));
    }
    else if(scope.key === 'L30'){
      const from = max ? new Date(new Date(max).getTime() - 29*86400000).toISOString().slice(0,10) : '';
      scopeDates = all.filter(d => d >= from);
      const pTo = from ? new Date(new Date(from).getTime() - 86400000).toISOString().slice(0,10) : '';
      const pFrom = from ? new Date(new Date(from).getTime() - 30*86400000).toISOString().slice(0,10) : '';
      prevDates = all.filter(d => d >= pFrom && d < (pTo || ''));
    }
    else if(scope.key === 'CM'){
      const m = max?.slice(0,7) || '';
      scopeDates = all.filter(d => d.startsWith(m));
      const pm = m ? new Date(new Date(m+'-01').getTime() - 86400000).toISOString().slice(0,7) : '';
      prevDates = all.filter(d => d.startsWith(pm));
    }
  }
  
  // Filter records
  const scopeRecs = hasData ? data.recs.filter(r => scopeDates.includes(r.date)) : [];
  const prevRecs = hasData ? data.recs.filter(r => prevDates.includes(r.date)) : [];
  
  // Calculations
  const total = scopeRecs.reduce((s,r) => s + r.tot, 0);
  const prevTotal = prevRecs.reduce((s,r) => s + r.tot, 0);
  const chg = prevTotal ? (total - prevTotal) / prevTotal * 100 : null;
  
  const cardTot = scopeRecs.filter(r => isCard(r) && isVol(r)).reduce((s,r) => s + r.tot, 0);
  const digTot = scopeRecs.filter(r => r.group === 'DIGITAL').reduce((s,r) => s + r.tot, 0);
  
  const cardAppr = (() => {
    let a=0,d=0;
    scopeRecs.forEach(r => { if(isCard(r)){ if(isVol(r)) a+=r.ap; d+=r.de; }});
    return a+d > 0 ? a/(a+d)*100 : null;
  })();
  
  const decl = scopeRecs.filter(r => isCard(r)).reduce((s,r) => s + r.de, 0);
  
  // Build HTML
  const navHtml = NAV_ITEMS.map(n => `
    <button class="nav-item ${tab === n.id ? 'active' : ''}" data-tab="${n.id}">
      <span class="icon">${n.icon}</span>
      <span class="label">${n.label}</span>
    </button>
  `).join('');

  const scopeHtml = SCOPES.map(s => `
    <button class="scope-btn ${State.scope === s.key ? 'active' : ''}" data-scope="${s.key}">${s.label}</button>
  `).join('');

  const statusClass = valid && hasData ? 'online' : errors.length ? 'offline' : 'warning';
  const statusDot = valid && hasData ? 'green' : errors.length ? 'red' : 'yellow';
  const statusText = valid && hasData ? 'Live' : errors.length ? 'Error' : 'No Data';

  let contentHtml = '';
  
  if(!hasData || errors.length){
    contentHtml = `
      <div class="empty-state">
        <div class="icon">${errors.length ? '🔍' : '📊'}</div>
        <h3>${errors.length ? 'Data Validation Issues' : 'No Data Available'}</h3>
        <p>${errors.length ? errors.join('<br>') : 'Connect a Tableau worksheet with the required fields.'}</p>
        <div class="fields-grid">
          ${REQUIRED_FIELDS.map(f => `<span class="tag">${f}</span>`).join('')}
        </div>
        ${warnings.length ? `<p style="margin-top:12px;color:var(--warning);font-size:13px;">⚠️ ${warnings.join('; ')}</p>` : ''}
        <button onclick="location.reload()" style="margin-top:20px;padding:10px 28px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-family:var(--font);">Retry</button>
      </div>
    `;
  } else {
    // Build main content
    const metrics = [
      { label:'Total Transactions', value:fmt(total), change:chg, sub:`${scopeDates.length} days` },
      { label:'Card Volume', value:fmt(cardTot), change:prevTotal ? (cardTot - prevRecs.filter(r=>isCard(r)&&isVol(r)).reduce((s,r)=>s+r.tot,0)) / (prevRecs.filter(r=>isCard(r)&&isVol(r)).reduce((s,r)=>s+r.tot,0)||1) * 100 : null },
      { label:'Digital Volume', value:fmt(digTot), change:prevTotal ? (digTot - prevRecs.filter(r=>r.group==='DIGITAL').reduce((s,r)=>s+r.tot,0)) / (prevRecs.filter(r=>r.group==='DIGITAL').reduce((s,r)=>s+r.tot,0)||1) * 100 : null },
      { label:'Approval Rate', value:pct(cardAppr), sub:`${fmt(decl)} declined` }
    ];

    const metricHtml = metrics.map(m => `
      <div class="metric">
        <div class="label">${m.label}</div>
        <div class="value">${m.value}</div>
        ${m.change != null ? `<span class="change ${m.change >= 0 ? 'up' : 'down'}">${m.change >= 0 ? '↑' : '↓'} ${Math.abs(m.change).toFixed(1)}%</span>` : ''}
        ${m.sub ? `<div class="sub">${m.sub}</div>` : ''}
      </div>
    `).join('');

    // Top categories
    const catMap = {};
    scopeRecs.forEach(r => { 
      if(isVol(r)){ catMap[r.cat] = (catMap[r.cat]||0) + r.tot; }
    });
    const topCats = Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
    const maxCat = topCats.length ? topCats[0][1] : 1;

    const catRows = topCats.map(([name,val]) => `
      <tr>
        <td>${name}</td>
        <td class="mono" style="text-align:right;">${fmt(val)}</td>
        <td style="width:120px;">
          <div style="height:6px;background:var(--bg-tertiary);border-radius:4px;overflow:hidden;">
            <div style="height:100%;width:${(val/maxCat*100).toFixed(1)}%;background:linear-gradient(90deg,var(--accent),#6c8cff);border-radius:4px;"></div>
          </div>
        </td>
        <td style="text-align:right;color:var(--text-muted);font-size:12px;">${(val/total*100).toFixed(1)}%</td>
      </tr>
    `).join('');

    const tabContent = {
      overview: `
        <div class="grid-2">${metricHtml}</div>
        <div style="margin-top:20px;display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div class="card">
            <div class="card-header"><h3>Top Categories</h3><span class="sub">by volume</span></div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>Category</th><th style="text-align:right;">Volume</th><th></th><th style="text-align:right;">Share</th></tr></thead>
                <tbody>${catRows || '<tr><td colspan="4" style="text-align:center;color:var(--text-muted);">No data</td></tr>'}</tbody>
              </table>
            </div>
          </div>
          <div class="card">
            <div class="card-header"><h3>Data Health</h3><span class="sub">validation summary</span></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
              <div><div class="text-muted" style="font-size:11px;">Total Rows</div><div class="font-mono" style="font-size:20px;font-weight:700;">${fmt(data.recs.length)}</div></div>
              <div><div class="text-muted" style="font-size:11px;">Date Range</div><div style="font-size:14px;font-weight:600;">${data.dates.length ? dateFmt(data.dates[0]) + ' → ' + dateFmt(data.dates[data.dates.length-1]) : '—'}</div></div>
              <div><div class="text-muted" style="font-size:11px;">Categories</div><div class="font-mono" style="font-size:20px;font-weight:700;">${Object.keys(catMap).length}</div></div>
              <div><div class="text-muted" style="font-size:11px;">Days in Scope</div><div class="font-mono" style="font-size:20px;font-weight:700;">${scopeDates.length}</div></div>
            </div>
            ${warnings.length ? `<div style="margin-top:12px;padding:10px 14px;background:#fffbeb;border-radius:8px;font-size:12px;color:var(--warning);">⚠️ ${warnings.join('; ')}</div>` : ''}
          </div>
        </div>
      `,
      cards: `
        <div class="card">
          <div class="card-header"><h3>💳 Card Transactions</h3><span class="sub">${scopeDates.length} days</span></div>
          <div class="grid-3" style="margin-bottom:16px;">
            <div class="metric"><div class="label">Card Volume</div><div class="value">${fmt(cardTot)}</div></div>
            <div class="metric"><div class="label">Approval Rate</div><div class="value">${pct(cardAppr)}</div></div>
            <div class="metric"><div class="label">Declined</div><div class="value" style="color:var(--danger);">${fmt(decl)}</div></div>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Category</th><th style="text-align:right;">Approved</th><th style="text-align:right;">Declined</th><th style="text-align:right;">Total</th><th style="text-align:right;">Rate</th></tr></thead>
              <tbody>
                ${scopeRecs.filter(r => isCard(r) && isVol(r)).reduce((acc,r) => {
                  const key = r.cat;
                  if(!acc[key]) acc[key] = { ap:0, de:0, tot:0 };
                  acc[key].ap += r.ap; acc[key].de += r.de; acc[key].tot += r.tot;
                  return acc;
                }, {}) |> Object.entries($).map(([name,stats]) => `
                  <tr>
                    <td>${name}</td>
                    <td class="mono" style="text-align:right;">${fmt(stats.ap)}</td>
                    <td class="mono" style="text-align:right;color:var(--danger);">${fmt(stats.de)}</td>
                    <td class="mono" style="text-align:right;font-weight:600;">${fmt(stats.tot)}</td>
                    <td style="text-align:right;">${stats.tot ? pct(stats.ap/stats.tot*100) : '—'}</td>
                  </tr>
                `).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);">No card data</td></tr>'}
              </tbody>
            </table>
          </div>
        </div>
      `,
      digital: `
        <div class="card">
          <div class="card-header"><h3>📱 Digital Transactions</h3><span class="sub">${scopeDates.length} days</span></div>
          <div class="grid-3" style="margin-bottom:16px;">
            <div class="metric"><div class="label">Digital Volume</div><div class="value">${fmt(digTot)}</div></div>
            <div class="metric"><div class="label">Share of Total</div><div class="value">${total ? pct(digTot/total*100) : '—'}</div></div>
            <div class="metric"><div class="label">Daily Avg</div><div class="value">${scopeDates.length ? fmt(digTot/scopeDates.length) : '—'}</div></div>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Channel</th><th style="text-align:right;">Volume</th><th style="text-align:right;">Share</th></tr></thead>
              <tbody>
                ${scopeRecs.filter(r => r.group === 'DIGITAL').reduce((acc,r) => {
                  acc[r.cat] = (acc[r.cat]||0) + r.tot;
                  return acc;
                }, {}) |> Object.entries($).sort((a,b)=>b[1]-a[1]).map(([name,val]) => `
                  <tr>
                    <td>${name}</td>
                    <td class="mono" style="text-align:right;">${fmt(val)}</td>
                    <td style="text-align:right;">${digTot ? pct(val/digTot*100) : '—'}</td>
                  </tr>
                `).join('') || '<tr><td colspan="3" style="text-align:center;color:var(--text-muted);">No digital data</td></tr>'}
              </tbody>
            </table>
          </div>
        </div>
      `,
      comparison: `
        <div class="card">
          <div class="card-header"><h3>📈 Period Comparison</h3><span class="sub">current vs previous period</span></div>
          <div class="grid-3">
            <div class="metric"><div class="label">Current Period</div><div class="value">${fmt(total)}</div><div class="sub">${scopeDates.length} days</div></div>
            <div class="metric"><div class="label">Previous Period</div><div class="value">${fmt(prevTotal)}</div><div class="sub">${prevDates.length} days</div></div>
            <div class="metric"><div class="label">Change</div><div class="value" style="color:${chg >= 0 ? 'var(--success)' : 'var(--danger)'};">${chg != null ? (chg >= 0 ? '↑' : '↓') + ' ' + Math.abs(chg).toFixed(1) + '%' : '—'}</div></div>
          </div>
        </div>
      `,
      dayvs: `
        <div class="card">
          <div class="card-header"><h3>⚖️ Day vs Day</h3><span class="sub">compare any two days</span></div>
          <div style="color:var(--text-secondary);padding:20px;text-align:center;">
            <p>Select two dates to compare transaction volumes side by side.</p>
            <div style="display:flex;gap:12px;justify-content:center;margin-top:12px;flex-wrap:wrap;">
              ${data.dates.slice(-14).map(d => `
                <button class="scope-btn" style="padding:6px 12px;background:var(--bg-tertiary);border:1px solid var(--border-light);border-radius:6px;cursor:pointer;font-size:12px;" data-day="${d}">${dateFmt(d)}</button>
              `).join('')}
            </div>
            <p style="margin-top:12px;font-size:13px;">Click two dates to compare. Feature coming soon.</p>
          </div>
        </div>
      `,
      data: `
        <div class="card">
          <div class="card-header"><h3>📋 Raw Data</h3><span class="sub">${data.recs.length} rows</span></div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Date</th><th>Group</th><th>Category</th><th>Sub-Category</th><th style="text-align:right;">Approved</th><th style="text-align:right;">Declined</th><th style="text-align:right;">Total</th></tr></thead>
              <tbody>
                ${data.recs.slice(0, 50).map(r => `
                  <tr>
                    <td>${dateFmt(r.date)}</td>
                    <td><span class="badge ${r.group === 'CARD' ? 'info' : r.group === 'DIGITAL' ? 'success' : 'warning'}">${r.group}</span></td>
                    <td>${r.cat}</td>
                    <td style="color:var(--text-muted);">${r.sub || '—'}</td>
                    <td class="mono" style="text-align:right;">${fmt(r.ap)}</td>
                    <td class="mono" style="text-align:right;color:var(--danger);">${fmt(r.de)}</td>
                    <td class="mono" style="text-align:right;font-weight:600;">${fmt(r.tot)}</td>
                  </tr>
                `).join('')}
                ${data.recs.length > 50 ? `<tr><td colspan="7" style="text-align:center;color:var(--text-muted);">+ ${data.recs.length - 50} more rows</td></tr>` : ''}
              </tbody>
            </table>
          </div>
        </div>
      `
    };

    contentHtml = tabContent[tab] || tabContent.overview;
  }

  root.innerHTML = `
    <div class="app">
      <aside class="sidebar" id="sidebar">
        <div class="brand">
          <div class="brand-icon">CB</div>
          <div class="brand-text">
            <h1>Commercial Bank</h1>
            <p>Transaction Intelligence</p>
          </div>
        </div>
        <nav class="nav-list">${navHtml}</nav>
        <div class="sidebar-footer">
          <div style="font-size:11px;color:var(--text-muted);padding:8px 12px;">
            <span class="status-dot ${statusDot}"></span> ${statusText}
          </div>
        </div>
      </aside>
      <main class="main">
        <header class="header">
          <div class="header-left">
            <h2>${NAV_ITEMS.find(n=>n.id===tab)?.label || 'Overview'}</h2>
            <p>${hasData ? `${data.recs.length} transactions · ${data.dates.length} days` : 'No data loaded'}</p>
          </div>
          <div class="header-right">
            <div class="scope-group">${scopeHtml}</div>
            <span class="status-badge ${statusClass}">
              <span class="status-dot ${statusDot}"></span>
              ${statusText}
            </span>
          </div>
        </header>
        <div class="content">${contentHtml}</div>
      </main>
    </div>
  `;

  // Event listeners
  document.querySelectorAll('[data-tab]').forEach(el => {
    el.addEventListener('click', () => {
      State.tab = el.dataset.tab;
      renderDashboard();
    });
  });

  document.querySelectorAll('[data-scope]').forEach(el => {
    el.addEventListener('click', () => {
      State.scope = el.dataset.scope;
      renderDashboard();
    });
  });

  document.querySelectorAll('[data-day]').forEach(el => {
    el.addEventListener('click', () => {
      // Simple day selection for Day vs Day
      const day = el.dataset.day;
      const existing = document.querySelector('[data-day-selected]');
      if(existing && existing.dataset.day === day){
        existing.removeAttribute('data-day-selected');
        existing.style.borderColor = 'var(--border-light)';
        return;
      }
      if(existing){
        existing.removeAttribute('data-day-selected');
        existing.style.borderColor = 'var(--border-light)';
      }
      el.setAttribute('data-day-selected', 'true');
      el.style.borderColor = 'var(--accent)';
      el.style.background = 'var(--accent-light)';
      
      // Show toast
      showToast('Day selected: ' + dateFmt(day), 'info');
    });
  });
}

/* =========================== TOAST ========================== */
function showToast(message, type = 'info'){
  const existing = document.querySelector('.toast');
  if(existing) existing.remove();
  const div = document.createElement('div');
  div.className = `toast ${type}`;
  div.innerHTML = `
    <button class="close" onclick="this.parentElement.remove()">×</button>
    <div class="title">${type === 'error' ? 'Error' : type === 'success' ? 'Success' : 'Info'}</div>
    <div>${message}</div>
  `;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 5000);
}

/* =========================== INIT ========================== */
async function init(){
  const root = document.getElementById('root');
  root.innerHTML = `
    <div class="loading-overlay">
      <div class="loading-spinner"></div>
      <p>Loading transaction data...</p>
    </div>
  `;

  try {
    const result = await loadData();
    
    if(result && result.cols && result.cols.length) {
      State.cols = result.cols;
      State.raw = result.rows || [];
      State.validation = validate(result.cols, State.raw);
      
      if(State.validation.valid && State.raw.length) {
        State.data = processData(result.cols, State.raw);
        if(!State.data) {
          State.validation.errors.push('Failed to process data - check field formats');
          State.validation.valid = false;
        }
      }
    } else {
      State.validation = {
        valid: false,
        errors: ['No data source available. Connect a Tableau worksheet.'],
        warnings: [],
        fields: {},
        hasData: false
      };
    }
    
    State.loading = false;
    renderDashboard();
    
    // Show status
    if(State.validation?.valid && State.data) {
      showToast(`✅ Loaded ${State.data.recs.length} transactions`, 'success');
    } else if(State.validation?.errors?.length) {
      showToast(`⚠️ ${State.validation.errors.join('; ')}`, 'warning');
    }
    
  } catch(e) {
    console.error('Init error:', e);
    State.loading = false;
    State.error = e.message;
    State.validation = {
      valid: false,
      errors: [e.message || 'Unknown error'],
      warnings: [],
      fields: {},
      hasData: false
    };
    renderDashboard();
    showToast('Error loading data: ' + e.message, 'error');
  }
}

// Start
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
